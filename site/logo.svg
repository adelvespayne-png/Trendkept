<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Trendkept">
  <!-- Brand mark: the trend, kept — a rising line ratcheting above its
       baseline inside the brand-blue tile. Same blue as the site accent. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3987e5"/>
      <stop offset="1" stop-color="#2a78d6"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- baseline the trend never closes below -->
  <path d="M24 96h80" stroke="#ffffff" stroke-opacity=".35" stroke-width="6"
        stroke-linecap="round"/>
  <!-- the kept trend: higher highs, higher lows -->
  <path d="M28 84 L52 60 L62 70 L86 42 L96 52 L100 32"
        fill="none" stroke="#ffffff" stroke-width="10"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
