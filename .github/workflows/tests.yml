# Run the full test suite on every push and pull request, so nothing
# broken can reach main without a red X warning the owner first.
name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run the test suite
        run: python -m unittest discover -s tests -v
