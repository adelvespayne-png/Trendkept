# Every Sunday morning, draft The Trend Check automatically:
# run the engine's verdict table over the standard tickers and open a
# GitHub issue containing the ready-to-paste newsletter draft. GitHub
# emails the issue to the owner — the Sunday job becomes: open email,
# paste into Buttondown, press Send.
#
# Scheduled workflows only run from the default branch (main).
name: Sunday Trend Check draft

on:
  schedule:
    - cron: "0 7 * * 0" # Sundays 07:00 UTC (~8am UK)
  workflow_dispatch: {} # and on demand, via the Actions tab

permissions:
  issues: write
  contents: read

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check the data keys are configured
        # Prints presence and a live-connection verdict only — never the
        # key values themselves.
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
        run: |
          python - <<'EOF'
          import os
          kid = os.environ.get("APCA_API_KEY_ID") or ""
          sec = os.environ.get("APCA_API_SECRET_KEY") or ""
          print(f"APCA_API_KEY_ID secret: {'present, %d chars' % len(kid) if kid else 'MISSING'}")
          print(f"APCA_API_SECRET_KEY secret: {'present, %d chars' % len(sec) if sec else 'MISSING'}")
          if kid and sec:
              from trendkept.alpaca import AlpacaClient
              try:
                  bars = AlpacaClient(paper=True, feed="iex").daily_bars("AAPL", timeframe="1Day")
                  print(f"Alpaca data check: OK, {len(bars)} AAPL bars")
              except Exception as exc:
                  print(f"Alpaca data check FAILED: {exc}")
          EOF

      - name: Generate the verdict table
        # The free data providers refuse requests from cloud servers, so
        # the run uses the owner's Alpaca *paper* data keys, stored as
        # repository Actions secrets (market-data reads only — this
        # workflow never places orders).
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
        run: |
          python business/launch/trend_check.py --default --draft > /tmp/draft.md
          cat /tmp/draft.md

      - name: Assemble the draft issue body
        run: |
          {
            echo "Paste-ready draft for this Sunday's issue — copy from the"
            echo "Subject line down into Buttondown, fill the [BRACKETED]"
            echo "spots (issue number, lesson, your name), press Send."
            echo
            echo "---"
            echo
            cat /tmp/draft.md
            echo
            echo "---"
            echo
            echo "_Generated automatically. Review before sending: states"
            echo "must stay descriptive (LEGAL.md §2), and any ticker row"
            echo "showing a data error should be removed or rerun._"
          } > /tmp/issue.md

      - name: Open the draft issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "The Trend Check — draft for Sunday $(date -u +%Y-%m-%d)" \
            --body-file /tmp/issue.md \
            --repo "$GITHUB_REPOSITORY"
